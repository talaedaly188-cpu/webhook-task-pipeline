services:
  db:
    image: postgres:16-alpine
    container_name: webhook_pipeline_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhook_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
