services:
  db:
    image: postgres:16-alpine
    container_name: webhook_pipeline_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webhook_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: webhook_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook_pipeline
      PORT: 3000
    ports:
      - "3000:3000"
    command: npm run start

  worker:
    build: .
    container_name: webhook_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook_pipeline
    command: node dist/worker/worker.js

volumes:
  postgres_data:
